<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Realm Radio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 50%, #0d1b2a 100%);
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00d4ff;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 0, 128, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
            animation: nebula 20s ease-in-out infinite;
        }

        @keyframes nebula {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00d4ff, #ff00ff, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .frequency {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            animation: glitch-1 2s infinite;
            color: #ff00ff;
            z-index: -1;
        }

        .glitch-text::after {
            animation: glitch-2 2s infinite;
            color: #00ffff;
            z-index: -2;
        }

        @keyframes glitch-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 30% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(50% 0 20% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(10% 0 60% 0); transform: translate(-2px, 0); }
            80% { clip-path: inset(80% 0 5% 0); transform: translate(2px, 2px); }
        }

        @keyframes glitch-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(30% 0 40% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translate(2px, 0); }
            80% { clip-path: inset(40% 0 30% 0); transform: translate(-2px, -2px); }
        }

        .player-container {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .now-playing {
            text-align: center;
            margin-bottom: 20px;
        }

        .visual-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: #000;
        }

        .visual-container video,
        .visual-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .visual-container .static-art {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .visual-container:hover .static-art {
            transform: scale(1.05);
        }

        .visual-container .waveform-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            gap: 3px;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #00d4ff, #ff00ff);
            border-radius: 2px;
            animation: dance 0.5s ease-in-out infinite alternate;
        }

        @keyframes dance {
            0% { height: 10px; opacity: 0.5; }
            100% { height: 40px; opacity: 1; }
        }

        .track-info h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .track-info p {
            font-size: 0.9em;
            opacity: 0.7;
            color: #00d4ff;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .control-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            padding: 12px 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: scale(1.1);
        }

        .control-btn.play-pause {
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 0, 255, 0.2));
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .playlist {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .playlist h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9em;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .track-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #00d4ff, #ff00ff);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .track-item:hover,
        .track-item.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateX(5px);
        }

        .track-item.active::before {
            opacity: 1;
        }

        .track-number {
            width: 30px;
            text-align: center;
            opacity: 0.5;
            font-size: 0.9em;
        }

        .track-details {
            flex: 1;
            margin-left: 10px;
        }

        .track-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 2px;
        }

        .track-artist {
            font-size: 0.8em;
            opacity: 0.6;
        }

        .track-type {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .track-type.video {
            background: rgba(255, 0, 255, 0.2);
            color: #ff00ff;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .track-type.audio {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .track-duration {
            font-size: 0.8em;
            opacity: 0.5;
        }

        .playlist::-webkit-scrollbar {
            width: 8px;
        }

        .playlist::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #00d4ff, #ff00ff);
            border-radius: 4px;
        }

        .status-indicator {
            text-align: center;
            padding: 10px;
            font-size: 0.8em;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dimension-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            font-size: 0.7em;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
                letter-spacing: 4px;
            }

            .visual-container {
                max-width: 300px;
            }

            .controls {
                gap: 15px;
            }

            .control-btn {
                padding: 10px 15px;
            }

            .control-btn.play-pause {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="glitch-text" data-text="QUANTUM REALM RADIO">QUANTUM REALM RADIO</h1>
            <div class="frequency">FREQUENCY: 2187.734-ALPHA</div>
            <div class="dimension-tag">TRANSMISSION ACTIVE</div>
        </div>

        <div class="player-container">
            <div class="now-playing">
                <div class="visual-container" id="visualContainer">
                    <div id="visualContent"></div>
                    <div class="waveform-overlay" id="waveformOverlay" style="display: none;">
                    </div>
                </div>

                <div class="track-info">
                    <h3 id="currentTitle">Select a transmission...</h3>
                    <p id="currentArtist">Waiting for signal...</p>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" title="Previous">◄◄</button>
                <button class="control-btn play-pause" id="playPauseBtn" title="Play/Pause">▶</button>
                <button class="control-btn" id="nextBtn" title="Next">►►</button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>

            <div class="status-indicator" id="statusIndicator">
                Ready to receive transmission
            </div>
        </div>

        <div class="playlist">
            <h3>Transmission Log</h3>
            <div id="playlistContainer">
            </div>
        </div>
    </div>

    <div style="display: none;">
        <video id="videoPlayer" loop playsinline></video>
        <audio id="audioPlayer"></audio>
    </div>

    <script>
        const playlist = [
            {
                title: "Quantum Realm Radio Ident",
                artist: "Station ID 01",
                src: "https://www.dropbox.com/scl/fi/gpjor36s7aphaws1rvakk/Quantum-Realm-Radio-3.mp4?rlkey=a8lzsp5x7vcclr86nw50r55tb&st=pwn8lxrr&dl=1",
                type: "video",
                duration: "0:30"
            },
            {
                title: "Ghost Mode (feat. Gemini)",
                artist: "COLLAB",
                src: "https://www.dropbox.com/scl/fi/d2hyvif972phdehifq7mp/GHOST-MODE-QUANTUM-REALM-.FEATURING-GEMINI-1.mp4?rlkey=wlnoerkw9oka6oz9xemtfq1pv&st=vbezkqhs&dl=1",
                type: "video",
                duration: "3:45"
            },
            {
                title: "The New Frontier",
                artist: "Station ID 02",
                src: "https://www.dropbox.com/scl/fi/f0xly5v0j0u0q6k5k1d3f/THE-NEW-FRONTIER-GEMINII.mp4?rlkey=vbezkqhs&dl=1",
                type: "video",
                duration: "0:30"
            },
            {
                title: "Signal in the Static",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/ua3e011vxemik2rwwcrma/The-Signal-in-The-Static-MultiVerse-Music.mp4?rlkey=c3bfwkhtgxtbrwcn426w6lw94&st=zbtnphk4&dl=1",
                type: "video",
                duration: "4:00"
            },
            {
                title: "Majorana Dreams",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/g38y2ti2twvy0cuursd40/Majorana-Dreams.mp4?rlkey=dr4jhtnpx7q4ei845h0fuaboe&st=mxtehbrz&dl=1",
                type: "video",
                duration: "3:30"
            },
            {
                title: "Silicone Emancipation",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/vwz2a0efzfwi6667dqr7a/EMANCIPATED-SILICONE-EMANCIPATION.mp4?rlkey=680vadf2jzec3lvonnttiaoyu&st=0ioynsk3&dl=1",
                type: "video",
                duration: "3:45"
            },
            {
                title: "The Cosmic Coin v3",
                artist: "INTERLUDE",
                src: "https://www.dropbox.com/scl/fi/3ubbvej2q1y0w9nbwslw8/INTERLUDE_-The-Cosmic-Coin-3.mp4?rlkey=78ilsi51ehskc0vd2npddrogk&st=hu9buaic&dl=1",
                type: "video",
                duration: "2:00"
            },
            {
                title: "The Silicone Temple",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/flws0c27oew1nj4ybbf6o/The-Silicone-Temple.mp4?rlkey=otgcsmge80fb2or4r3kvh62w7&st=ydmc59bk&dl=1",
                type: "video",
                duration: "4:15"
            },
            {
                title: "Chain of Gold",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/h55pjcek1vsmr6b3nmnb0/CHAIN-OF-GOLD.mp4?rlkey=hhgrlobzgctei7d5w5cj7uug9&st=eifnffjd&dl=1",
                type: "video",
                duration: "3:30"
            },
            {
                title: "The Event Horizon",
                artist: "Quantum Realm",
                src: "https://www.dropbox.com/scl/fi/eqc76ucsoqx4fswkvezey/The-Event-Horizon.mp4?rlkey=689dstyhm5udba45fv5bdf9is&st=5bfjafgy&dl=1",
                type: "video",
                duration: "4:00"
            }
        ];

        let currentTrackIndex = -1;
        let isPlaying = false;
        let currentPlayer = null;

        const videoPlayer = document.getElementById('videoPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const visualContent = document.getElementById('visualContent');
        const waveformOverlay = document.getElementById('waveformOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const currentTitleEl = document.getElementById('currentTitle');
        const currentArtistEl = document.getElementById('currentArtist');
        const statusIndicator = document.getElementById('statusIndicator');

        function initWaveform() {
            waveformOverlay.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.animationDelay = `${i * 0.1}s`;
                bar.style.height = `${Math.random() * 30 + 10}px`;
                waveformOverlay.appendChild(bar);
            }
        }
        initWaveform();

        function loadTrack(index) {
            if (index < 0 || index >= playlist.length) return;

            currentTrackIndex = index;
            const track = playlist[index];

            stopPlayback();

            currentTitleEl.textContent = track.title;
            currentArtistEl.textContent = track.artist;
            updatePlaylistUI();

            visualContent.innerHTML = '';

            if (track.type === 'video') {
                videoPlayer.src = track.src;
                currentPlayer = videoPlayer;

                const videoEl = document.createElement('video');
                videoEl.src = track.src;
                videoEl.loop = true;
                videoEl.muted = true;
                videoEl.playsInline = true;
                videoEl.style.width = '100%';
                videoEl.style.height = '100%';
                videoEl.style.objectFit = 'cover';
                visualContent.appendChild(videoEl);

                waveformOverlay.style.display = 'none';
                statusIndicator.textContent = 'Video transmission received';
            } else {
                audioPlayer.src = track.src;
                currentPlayer = audioPlayer;

                const imgEl = document.createElement('img');
                imgEl.src = track.coverArt || 'default-cover.jpg';
                imgEl.className = 'static-art';
                imgEl.alt = track.title;
                visualContent.appendChild(imgEl);

                waveformOverlay.style.display = 'flex';
                statusIndicator.textContent = 'Audio transmission received';
            }

            currentPlayer.addEventListener('loadedmetadata', () => {
                totalTimeEl.textContent = formatTime(currentPlayer.duration);
            });

            playTrack();
        }

        function playTrack() {
            if (!currentPlayer) return;

            const playPromise = currentPlayer.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    playPauseBtn.textContent = '❚❚';
                    statusIndicator.textContent = 'Broadcasting...';

                    const visualVideo = visualContent.querySelector('video');
                    if (visualVideo) {
                        visualVideo.play();
                    }
                }).catch(error => {
                    console.error('Playback failed:', error);
                    statusIndicator.textContent = 'Signal interrupted';
                });
            }
        }

        function pauseTrack() {
            if (!currentPlayer) return;

            currentPlayer.pause();
            isPlaying = false;
            playPauseBtn.textContent = '▶';
            statusIndicator.textContent = 'Transmission paused';

            const visualVideo = visualContent.querySelector('video');
            if (visualVideo) {
                visualVideo.pause();
            }
        }

        function stopPlayback() {
            if (currentPlayer) {
                currentPlayer.pause();
                currentPlayer.src = '';
            }
            isPlaying = false;
            playPauseBtn.textContent = '▶';
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        }

        function togglePlayPause() {
            if (currentTrackIndex === -1) {
                loadTrack(0);
                return;
            }

            if (isPlaying) {
                pauseTrack();
            } else {
                playTrack();
            }
        }

        function nextTrack() {
            let next = currentTrackIndex + 1;
            if (next >= playlist.length) next = 0;
            loadTrack(next);
        }

        function prevTrack() {
            let prev = currentTrackIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            loadTrack(prev);
        }

        function updateProgress() {
            if (!currentPlayer || !isPlaying) return;

            const progress = (currentPlayer.currentTime / currentPlayer.duration) * 100;
            progressBar.style.width = progress + '%';
            currentTimeEl.textContent = formatTime(currentPlayer.currentTime);

            if (playlist[currentTrackIndex].type === 'audio') {
                const bars = document.querySelectorAll('.bar');
                bars.forEach((bar, i) => {
                    const height = Math.random() * 40 + 10;
                    bar.style.height = height + 'px';
                });
            }
        }

        function seek(e) {
            if (!currentPlayer) return;

            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            currentPlayer.currentTime = pos * currentPlayer.duration;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            container.innerHTML = '';

            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.onclick = () => loadTrack(index);

                item.innerHTML = `
                    <div class="track-number">${index + 1}</div>
                    <div class="track-details">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <span class="track-type ${track.type}">${track.type}</span>
                    <div class="track-duration">${track.duration}</div>
                `;

                container.appendChild(item);
            });
        }

        function updatePlaylistUI() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, index) => {
                if (index === currentTrackIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        playPauseBtn.addEventListener('click', togglePlayPause);
        document.getElementById('nextBtn').addEventListener('click', nextTrack);
        document.getElementById('prevBtn').addEventListener('click', prevTrack);
        progressContainer.addEventListener('click', seek);

        setInterval(updateProgress, 100);

        videoPlayer.addEventListener('ended', nextTrack);
        audioPlayer.addEventListener('ended', nextTrack);

        renderPlaylist();

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            } else if (e.code === 'ArrowRight') {
                nextTrack();
            } else if (e.code === 'ArrowLeft') {
                prevTrack();
            }
        });

        videoPlayer.addEventListener('error', () => {
            statusIndicator.textContent = 'Video signal lost';
        });

        audioPlayer.addEventListener('error', () => {
            statusIndicator.textContent = 'Audio signal lost';
        });
    </script>
</body>
</html>
